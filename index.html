<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE2IDJMMjQuNSA4LjVMMjggMTZMMjQuNSAyMy41TDE2IDBMTDcuNSAyMy41TDQgMTZMNy41IDguNUwxNiAyWiIgZmlsbD0iIzljYWZhZiIvPgo8L3N2Zz4=">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-950 min-h-screen text-gray-200">
    <header class="bg-gray-900/80 backdrop-blur-lg border-b border-gray-800/50 sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between max-w-7xl">
                <div class="flex items-center space-x-4">
                    <div class="w-10 h-10 bg-gray-700 rounded-lg flex items-center justify-center">
                        <i class="fas fa-cloud text-gray-300 text-lg"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-white">Media</h1>
                </div>
                <div class="flex items-center space-x-3">
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="Search files..." 
                               class="w-64 px-4 py-2.5 bg-gray-800/50 border border-gray-700/50 rounded-xl focus:outline-none focus:border-blue-500/50 focus:bg-gray-800/70 text-gray-200 placeholder-gray-500 backdrop-blur-sm transition-all duration-200">
                        <i class="fas fa-search absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 pointer-events-none"></i>
                    </div>
                    <button onclick="toggleView()" class="p-2.5 bg-gray-800/50 hover:bg-gray-700/50 rounded-xl border border-gray-700/50 transition-all duration-200 hover:scale-105">
                        <i class="fas fa-th text-gray-300" id="viewIcon"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-6 py-8">
        <div class="flex gap-8">
            <div class="flex-1 min-w-0">
                <div id="categoriesContainer" class="w-full">
                </div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed top-6 right-6 bg-gray-800/90 backdrop-blur-lg text-white px-6 py-3 rounded-xl shadow-2xl border border-gray-700/50 hidden toast z-50">
        <div class="flex items-center space-x-3">
            <i class="fas fa-check-circle text-green-400"></i>
            <span id="toastMessage" class="font-medium">Copied to clipboard!</span>
        </div>
    </div>

    <div id="previewModalContainer"></div>

    <script src="script.js"></script>
</body>
</html>
